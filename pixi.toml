[workspace]
authors = ["ehung <ethanhung11@gmail.com>"]
channels = ["conda-forge"]
name = "ChoanoCounter"
version = "0.1.0"
platforms = ["osx-arm64", "win-64"]

[tasks]

[tasks.build]
cmd = "python -m PyInstaller src/gui.py --windowed --name ChoanoCounter"
description = "Build the ChoanoCounter Installer."
default-environment = "main"

[tasks.gui]
cmd = "python src/gui.py"
description = "Launch the ChoanoCounter graphical interface from CLI."
default-environment = "main"

[dependencies]
python = ">=3.12,<3.14"
jupyter = ">=1.1.1,<2"
tqdm = ">=4.67.3,<5"

[pypi-dependencies]
opencv-python = ">=4.13.0.92, <5"
numpy = ">=2.4.6,<3"
scikit-image = ">=0.26.0, <0.27"
matplotlib = ">=3.10.9, <4"
scikit-learn = ">=1.8.0, <2"
session-info = ">=1.0.1, <2"
pyside6 = ">=6.11.1,<7"

[feature.main.pypi-dependencies]
pyinstaller = ">=6.21.0, <7"
nd2 = ">=0.11.3, <0.12"
pillow = ">=12.2.0, <13"

[feature.stardist]
platforms = ["osx-arm64"]

[feature.stardist.pypi-dependencies]
stardist = "*"
tensorflow = "*"
scikit-image = "*"
imageio = "*"

[feature.cellpose]
platforms = ["osx-arm64"]

[feature.cellpose.dependencies]
python = "*"

[feature.cellpose.pypi-dependencies]
cellpose = { version = "*", extras = ["gui"] }

[environments]
stardist = { features = ["default", "stardist"]}
cellpose = { features = ["default", "cellpose"]}
main = { features = ["default", "main"]}
